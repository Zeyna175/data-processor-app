<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traitement de Données</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 2rem; }
        .upload-zone { border: 3px dashed #cbd5e0; border-radius: 15px; padding: 3rem; text-align: center; cursor: pointer; transition: all 0.3s; background: #f8f9fa; margin-bottom: 2rem; }
        .upload-zone:hover { border-color: #667eea; background: #f0f4ff; }
        .btn { padding: 1rem 2rem; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4); }
        .preview-section { margin-top: 2rem; }
        .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 1rem; }
        .preview-card { background: white; border-radius: 15px; padding: 1.5rem; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .preview-card h3 { margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid #e9ecef; }
        .before h3 { color: #dc3545; }
        .after h3 { color: #28a745; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #667eea; color: white; padding: 0.75rem; text-align: left; position: sticky; top: 0; }
        td { padding: 0.75rem; border-bottom: 1px solid #e9ecef; }
        tr:hover { background: #f8f9fa; }
        .empty { background: #fff3cd; color: #856404; font-style: italic; }
        .table-scroll { overflow: auto; max-height: 400px; }
        .loading { text-align: center; padding: 2rem; color: #6c757d; }
        @media (max-width: 1200px) { .preview-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Traitement Automatique des Données</h1>
        
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <p style="font-size: 3rem; margin-bottom: 1rem;">📁</p>
            <p style="font-size: 1.2rem; color: #495057; font-weight: 600;">Cliquez pour sélectionner un fichier</p>
            <p style="color: #6c757d; margin-top: 0.5rem;">CSV, Excel, JSON, XML</p>
            <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,.json,.xml" style="display: none;" onchange="handleFile()">
        </div>

        <div id="fileName" style="text-align: center; margin-bottom: 1rem; font-weight: 600; color: #667eea;"></div>
        <div style="text-align: center;">
            <button class="btn btn-primary" id="processBtn" onclick="processFile()" style="display: none;">Traiter le fichier</button>
        </div>

        <div id="loading" class="loading" style="display: none;">⏳ Traitement en cours...</div>
        
        <div id="preview" class="preview-section" style="display: none;">
            <h2 style="text-align: center; color: #2c3e50; margin-bottom: 1.5rem;">📊 Aperçu des données</h2>
            <div class="preview-grid">
                <div class="preview-card before">
                    <h3>🔴 Avant traitement</h3>
                    <div class="table-scroll" id="tableBefore"></div>
                </div>
                <div class="preview-card after">
                    <h3>🟢 Après traitement</h3>
                    <div class="table-scroll" id="tableAfter"></div>
                </div>
            </div>
            <p style="text-align: center; color: #6c757d; margin-top: 1rem;">💡 Affichage des 10 premières lignes</p>
            <div style="text-align: center; margin-top: 2rem;">
                <button class="btn btn-primary" onclick="downloadFile()">📥 Télécharger le fichier traité</button>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let processedFilename = null;

        function handleFile() {
            selectedFile = document.getElementById('fileInput').files[0];
            if (selectedFile) {
                document.getElementById('fileName').textContent = `Fichier sélectionné : ${selectedFile.name}`;
                document.getElementById('processBtn').style.display = 'inline-block';
            }
        }

        async function processFile() {
            if (!selectedFile) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('preview').style.display = 'none';
            document.getElementById('processBtn').disabled = true;

            try {
                // 1. Analyser
                const formData = new FormData();
                formData.append('file', selectedFile);
                const analyzeRes = await fetch('/api/analyze', { method: 'POST', body: formData });
                const analysis = await analyzeRes.json();

                // 2. Traiter
                const processRes = await fetch('/api/process', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        filename: analysis.filename,
                        options: {
                            missing_strategy: 'mean',
                            outlier_method: 'iqr',
                            outlier_action: 'cap',
                            normalization: 'standard',
                            output_format: 'csv'
                        }
                    })
                });
                const result = await processRes.json();
                processedFilename = result.processed_file;

                // 3. Afficher preview
                if (result.preview) {
                    displayPreview(result.preview);
                    document.getElementById('preview').style.display = 'block';
                }
            } catch (error) {
                alert('Erreur : ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('processBtn').disabled = false;
            }
        }

        function displayPreview(preview) {
            const tableBefore = createTable(preview.columns, preview.before, true);
            const tableAfter = createTable(preview.columns, preview.after, false);
            document.getElementById('tableBefore').innerHTML = tableBefore;
            document.getElementById('tableAfter').innerHTML = tableAfter;
        }

        function createTable(columns, data, showEmpty) {
            let html = '<table><thead><tr>';
            columns.forEach(col => html += `<th>${col}</th>`);
            html += '</tr></thead><tbody>';
            data.forEach(row => {
                html += '<tr>';
                columns.forEach(col => {
                    const val = row[col];
                    const isEmpty = !val || val === '' || val === 'NaN';
                    const cls = showEmpty && isEmpty ? 'empty' : '';
                    html += `<td class="${cls}">${isEmpty ? 'NaN' : val}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            return html;
        }

        function downloadFile() {
            if (processedFilename) {
                window.location.href = `/api/download/${processedFilename}`;
            }
        }
    </script>
</body>
</html>
