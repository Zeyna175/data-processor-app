<div class="upload-container">
    <div class="stepper">
        <div class="step-item">
            <div class="step" [class.active]="currentStep === 1" [class.done]="currentStep > 1">
                <svg *ngIf="currentStep > 1" width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                </svg>
                <span *ngIf="currentStep <= 1">1</span>
            </div>
            <span class="step-label">Upload</span>
        </div>
        <div class="step-line" [class.done]="currentStep > 1"></div>
        <div class="step-item">
            <div class="step" [class.active]="currentStep === 2" [class.done]="currentStep > 2">
                <svg *ngIf="currentStep > 2" width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                </svg>
                <span *ngIf="currentStep <= 2">2</span>
            </div>
            <span class="step-label">Analyse</span>
        </div>
        <div class="step-line" [class.done]="currentStep > 2"></div>
        <div class="step-item">
            <div class="step" [class.active]="currentStep === 3" [class.done]="currentStep > 3">
                <svg *ngIf="currentStep > 3" width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                </svg>
                <span *ngIf="currentStep <= 3">3</span>
            </div>
            <span class="step-label">Options</span>
        </div>
        <div class="step-line" [class.done]="currentStep > 3"></div>
        <div class="step-item">
            <div class="step" [class.active]="currentStep === 4" [class.done]="currentStep > 4">
                <svg *ngIf="currentStep > 4" width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                </svg>
                <span *ngIf="currentStep <= 4">4</span>
            </div>
            <span class="step-label">Résultats</span>
        </div>
    </div>

    <div *ngIf="currentStep === 1" class="upload-card">
        <div class="upload-header">
            <h2>Importer un fichier</h2>
            <p>Formats supportés : CSV, Excel, JSON, XML</p>
        </div>

        <div class="drop-zone" (click)="fileInput.click()" (drop)="onDrop($event)"
            (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)">
            <div class="drop-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor"
                        stroke-width="1.5" stroke-linecap="round" />
                </svg>
            </div>
            <p>Cliquez ou glissez-déposez ici</p>
            <input #fileInput type="file" (change)="onFileSelected($event)" hidden accept=".csv,.xlsx,.xls,.json,.xml">
        </div>

        <div *ngIf="selectedFile" class="file-preview">
            <div class="preview-info">
                <span class="file-name">{{ selectedFile.name }}</span>
                <span class="file-size">{{ (selectedFile.size / 1024).toFixed(1) }} KB</span>
            </div>
            <button class="btn-analyze" (click)="analyzeFile()" [disabled]="isProcessing">
                <span *ngIf="!isProcessing">Analyser</span>
                <span *ngIf="isProcessing" class="spinner"></span>
            </button>
        </div>
    </div>

    <app-processing-options *ngIf="currentStep === 2" [analysis]="analysis" (back)="goBack()"
        (process)="processFile($event)">
    </app-processing-options>

    <app-results *ngIf="currentStep === 3" [stats]="processingStats" [filename]="processedFilename"
        (download)="downloadFile()" (newFile)="reset()" (viewPreview)="currentStep = 4">
    </app-results>

    <app-data-preview *ngIf="currentStep === 4 && dataPreview" [preview]="dataPreview"></app-data-preview>
    <div *ngIf="currentStep === 4" style="text-align: center; margin-top: 2rem;">
        <button class="btn-download" (click)="downloadFile()" style="margin-right: 1rem;">Télécharger</button>
        <button class="btn-new" (click)="reset()">Nouveau fichier</button>
    </div>

    <div *ngIf="error" class="alert-error">
        {{ error }}
    </div>
</div>
