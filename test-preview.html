<!DOCTYPE html>
<html>
<head>
    <title>Test API Preview</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        table { border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background: #667eea; color: white; }
        .before { background: #fff3cd; }
        .after { background: #d4edda; }
    </style>
</head>
<body>
    <h1>Test API Preview</h1>
    <input type="file" id="fileInput" accept=".csv">
    <button onclick="testAPI()">Tester</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert('Sélectionnez un fichier');

            // 1. Analyser
            const formData = new FormData();
            formData.append('file', file);
            const analyzeRes = await fetch('https://data-processor-app-1.onrender.com/api/analyze', {
                method: 'POST',
                body: formData
            });
            const analysis = await analyzeRes.json();
            console.log('Analysis:', analysis);

            // 2. Traiter
            const processRes = await fetch('https://data-processor-app-1.onrender.com/api/process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    filename: analysis.filename,
                    options: {
                        missing_strategy: 'mean',
                        outlier_method: 'iqr',
                        outlier_action: 'cap',
                        normalization: 'standard',
                        output_format: 'csv'
                    }
                })
            });
            const result = await processRes.json();
            console.log('Result:', result);

            // 3. Afficher preview
            if (result.preview) {
                let html = '<h2>Preview trouvé !</h2>';
                html += '<h3 class="before">Avant</h3>';
                html += '<table><tr>';
                result.preview.columns.forEach(col => html += `<th>${col}</th>`);
                html += '</tr>';
                result.preview.before.slice(0, 5).forEach(row => {
                    html += '<tr>';
                    result.preview.columns.forEach(col => html += `<td>${row[col] || 'NaN'}</td>`);
                    html += '</tr>';
                });
                html += '</table>';

                html += '<h3 class="after">Après</h3>';
                html += '<table><tr>';
                result.preview.columns.forEach(col => html += `<th>${col}</th>`);
                html += '</tr>';
                result.preview.after.slice(0, 5).forEach(row => {
                    html += '<tr>';
                    result.preview.columns.forEach(col => html += `<td>${row[col]}</td>`);
                    html += '</tr>';
                });
                html += '</table>';

                document.getElementById('result').innerHTML = html;
            } else {
                document.getElementById('result').innerHTML = '<p>Pas de preview dans la réponse</p>';
            }
        }
    </script>
</body>
</html>
